  <path d="M16 3.5L5.5 7.5v7.5c0 7 4.5 13.3 10.5 14.8V3.5z" fill="url(#glow)"/>
  <!-- Stylized "A" letterform integrated into shield -->
  <path d="M16 7L10.5 22h2.7l1-3h3.6l1 3h2.7L16 7zm0 5.2l1.3 4.3h-2.6L16 12.2z" fill="white"/>
  <!-- Digital eye/awareness arc above the A -->
  <path d="M9.5 10.5Q12.5 7.5 16 7.5Q19.5 7.5 22.5 10.5" stroke="white" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Small dot = pupil of awareness -->
  <circle cx="16" cy="9" r="1" fill="white" opacity="0.7"/>
</svg>
